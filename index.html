<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Open2Hub - 全网最全的导航网站</title>
    <link rel="shortcut icon" href="./assets/images/favicon.png">    
    <meta name="description" content="Open2Hub - 全网最全导航，收录海量优质站点，分类精准，一站直达，界面简洁，体验流畅，让每次上网都高效省心">

    <script>
        // 检测浏览器语言并自动跳转到对应版本
        (function() {
            var language;
            // 兼容不同浏览器的语言获取方式
            if (navigator.appName === "Netscape") {
                language = navigator.language;
            } else {
                language = navigator.browserLanguage;
            }

            // 根据语言首字母判断跳转目标
            if (language.indexOf("en") > -1) {
                document.location.href = "en/index.html";
            } else if (language.indexOf("zh") > -1) {
                document.location.href = "cn/index.html";
            } else {
                // 默认跳转至英文版
                document.location.href = "en/index.html";
            }
        })();
    </script>
</head>

<body>
    <!-- 页面内容由 JavaScript 自动跳转，无需额外渲染 -->
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open2Hub - 极简导航 | 开发工具·设计资源·AI工具·学习平台</title>
    <meta name="description" content="Open2Hub 是一个精心整理的极简网站导航，收录了常用网站、开发工具、设计资源、AI 工具、学习平台、社交媒体等分类的优质网站，每个网站都有详细介绍，助你高效上网。">
    <meta name="keywords" content="网站导航,上网导航,开发工具,设计资源,AI工具,学习网站,导航页,网址大全,程序员导航,设计师导航,ChatGPT,GitHub,VS Code">
    <meta name="author" content="Open2Hub">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#f5f5f7">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Open2Hub - 极简导航">
    <meta property="og:description" content="精心整理的极简网站导航，涵盖开发工具、设计资源、AI工具、学习平台等分类，每个网站都有详细介绍。">
    <meta property="og:site_name" content="Open2Hub">
    <meta property="og:locale" content="zh_CN">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Open2Hub - 极简导航">
    <meta name="twitter:description" content="精心整理的极简网站导航，涵盖开发工具、设计资源、AI工具、学习平台等分类。">

    <link rel="canonical" href="index.html">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
    <link rel="stylesheet" href="css/style.css">

    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Open2Hub - 极简导航",
        "description": "精心整理的网站导航大全，涵盖开发工具、设计资源、AI工具、学习平台等分类",
        "url": "index.html",
        "inLanguage": "zh-CN",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "index.html?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "网站导航分类",
        "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "常用网站" },
            { "@type": "ListItem", "position": 2, "name": "开发工具" },
            { "@type": "ListItem", "position": 3, "name": "设计资源" },
            { "@type": "ListItem", "position": 4, "name": "AI 工具" },
            { "@type": "ListItem", "position": 5, "name": "学习平台" },
            { "@type": "ListItem", "position": 6, "name": "社交媒体" }
        ]
    }
    </script>
</head>
<body>
    <!-- 公共背景（由 common.js 渲染） -->
    <div id="bgContainer"></div>

    <!-- 公共 Header（由 common.js 渲染） -->
    <div id="headerContainer"></div>

    <!-- 主内容 -->
    <main class="main" role="main">

        <!-- Hero 区域 -->
        <section class="hero" aria-labelledby="hero-heading">
            <h1 id="hero-heading">精选导航</h1>
            <p class="hero-sub">收录优质开发工具、设计资源、AI 工具与学习平台</p>
            <div class="hero-search" role="search">
                <div class="hero-search-inner">
                    <span class="hero-search-icon">⌕</span>
                    <input type="search" id="searchInput" placeholder="搜索网站名称、分类或关键词..." aria-label="搜索网站" autocomplete="off">
                    <kbd class="hero-search-kbd">Enter</kbd>
                </div>
            </div>
            <div class="hero-stats" id="heroStats"></div>
        </section>

        <!-- 分类筛选标签 -->
        <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="分类筛选"></div>

        <!-- 网站列表（由 JS 渲染） -->
        <div id="sitesContainer" aria-live="polite"></div>

        <!-- 无搜索结果提示 -->
        <div id="noResults" class="no-results" role="status">
            😕 没有找到匹配的网站，请尝试其他关键词
        </div>

    </main>

    <!-- 公共 Footer（由 common.js 渲染） -->
    <div id="footerContainer"></div>

    <!-- JS -->
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
